<app-pdf-toolbar
  [zoom]="zoom"
  [fileName]="pdfFile?.name || 'document.pdf'"
  (zoomIn)="handleZoomIn()"
  (zoomOut)="handleZoomOut()"
  (resetZoom)="handleResetZoom()"
  (download)="handleDownload()"
  (print)="handlePrint()"
/>

@if (loading) {
  <div class="preview-state preview-loading">
    <app-loading-spinner message="Rendering PDF…" />
  </div>
} @else if (error) {
  <div class="preview-state preview-error">
    <div class="error-icon-wrap">
      <svg
        width="40"
        height="40"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="15" y1="9" x2="9" y2="15" />
        <line x1="9" y1="9" x2="15" y2="15" />
      </svg>
    </div>
    <p class="error-title">Failed to render PDF</p>
    <p class="error-message">{{ error.message }}</p>
    <button class="retry-btn" (click)="loadPdf()">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M3 12a9 9 0 1 1 3 6.7" />
        <polyline points="3 7 3 13 9 13" />
      </svg>
      Try Again
    </button>
  </div>
} @else {
  <div id="pdf-scroll-container" class="pdf-scroll-container">
    <div #container class="pdf-container">
      <div
        class="pdf-pages-wrapper"
        [style.transform]="'scale(' + zoomScale + ')'"
        [style.minHeight]="zoomScale > 1 ? 100 * zoomScale + '%' : ''"
      >
        @for (page of pdfPages; track page.pageNum) {
          <app-pdf-page
            [page]="page"
            [containerWidth]="containerWidth"
            [pdfForm]="pdfForm"
            [allDocFields]="fields"
            [fieldOverrides]="fieldOverrides"
            (submitEvent)="handleSubmit()"
          />
        }
      </div>
    </div>
  </div>
}
